site_name: Vinyl Setup Notes
site_description: Practical defaults for a first vinyl setup and record collection
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Setup:
      - Paths: setup/paths.md
      - Troubleshooting: setup/troubleshooting.md
      - Beginner Mistakes: setup/beginner-mistakes.md
  - Buying:
      - Guide: buying/guide.md
      - Reading List: buying/reading-list.md
      - Example Setups: buying/example-setups.md
      - Speakers: buying/speakers.md
      - Headphones: buying/headphones.md
  - Collecting:
      - Guide: collecting/guide.md
  - Maintenance:
      - Guide: maintenance/guide.md
      - Deep Cleaning: maintenance/deep-cleaning.md
  - Upgrades:
      - Guide: upgrades/guide.md
  - Explore:
      - Glossary: explore/glossary.md
      - Exploring Genres: explore/genres.md
      - Community Resources: explore/community-resources.md
      - Niche Reading: explore/niche-reading.md

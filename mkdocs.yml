site_name: Vinyl Setup Notes
site_description: Practical defaults for a first vinyl setup and record collection
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Introduction: index.md
  - "Phase 1: Acquiring the Gear":
      - The Golden Rules: buying/guide.md
      - Brand Lineups: buying/brand-lineups.md
      - Example Setups: buying/example-setups.md
      - Deep Dive Upgrades: buying/deep-dive.md
      - Focus on Speakers: buying/speakers.md
      - Focus on Headphones: buying/headphones.md
  - "Phase 2: Putting it Together":
      - The Signal Chain: setup/paths.md
      - Avoiding Beginner Mistakes: setup/beginner-mistakes.md
      - Troubleshooting: setup/troubleshooting.md
  - "Phase 3: The Music":
      - The Art of Collecting: collecting/guide.md
      - Exploring Genres on Vinyl: explore/genres.md
  - "Phase 4: Care & Feeding":
      - Basic Maintenance: maintenance/guide.md
      - Deep Cleaning Methods: maintenance/deep-cleaning.md
      - The Upgrade Philosophy: upgrades/guide.md
  - "Phase 5: The Rabbit Hole":
      - Community Resources: explore/community-resources.md
      - Audiophile Reading List: buying/reading-list.md
      - Niche Deep Dives: explore/niche-reading.md
      - Glossary of Terms: explore/glossary.md
